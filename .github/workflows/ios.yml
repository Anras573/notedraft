name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build and test on iPad simulator
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      PROJECT_PATH: NoteDraft/NoteDraft.xcodeproj
      SCHEME: NoteDraft

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select available iPad simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(
            python3 -c "import json, subprocess; data = json.loads(subprocess.run(['xcrun', 'simctl', 'list', 'devices', 'available', '--json'], check=True, capture_output=True, text=True).stdout); print(next((device.get('udid', '') for devices in data.get('devices', {}).values() for device in devices if device.get('isAvailable') and 'iPad' in device.get('name', '')), ''))"
          )"
          if [ -z "${device_id}" ]; then
            echo "No available iPad simulator found."
            exit 1
          fi
          echo "device_id=${device_id}" >> "$GITHUB_OUTPUT"

      - name: Build for testing
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild test-without-building \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            CODE_SIGNING_ALLOWED=NO
